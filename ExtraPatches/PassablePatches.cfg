@PART[APUStank*]:NEEDS[APUS_Shuttle]:AFTER[APUS_Shuttle] 
{
    MODULE
    {
        name = ModuleFreeIva
        passThroughNodeA = top
        passThroughNodeB = bottom
    }
}

@PART[APUScargo*|APUShull*]:NEEDS[APUS_Shuttle]:AFTER[APUS_Shuttle] 
{
    MODULE
    {
        name = ModuleFreeIva
        doesNotBlockEVA = true
        passThroughNodeA = top
        passThroughNodeB = top2
    }
}